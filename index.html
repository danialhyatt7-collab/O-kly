<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oakly® — Modern Furnica</title>
  <meta name="description" content="Oakly® — Modern Furnica. One home, one story. Furniture crafted for everyday living." />
  <link rel="preload" href="assets/fonts/manrope.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="assets/fonts/caveat.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Intro curtain -->
  <div class="curtain" aria-hidden="true">
    <div class="curtain__panel curtain__panel--left"></div>
    <div class="curtain__panel curtain__panel--right"></div>
  </div>

  <!-- Custom cursor (fine pointers only) -->
  <div class="cursor" aria-hidden="true">
    <div class="cursor__dot"></div>
    <div class="cursor__ring"></div>
  </div>

  <header class="hero">

    <!-- Background -->
    <div class="hero__bg" data-depth="0.030">
      <img src="assets/hero-bg.jpg" alt="" fetchpriority="high" />
    </div>
    <div class="hero__vignette" aria-hidden="true"></div>
    <div class="hero__grain" aria-hidden="true"></div>

    <!-- Top bar -->
    <nav class="nav">
      <a class="nav__brand" href="#" data-magnetic aria-label="Oakly home">
        <img class="nav__logo" src="logo.svg" alt="Oakly — Modern Furnica" />
      </a>

      <ul class="nav__links">
        <li class="nav__item" style="--i:0"><a href="#collections" data-hover>Collections</a><span class="nav__comma">,</span></li>
        <li class="nav__item" style="--i:1"><a href="#lookbook" data-hover>Lookbook</a><span class="nav__comma">,</span></li>
        <li class="nav__item" style="--i:2"><a href="#craft" data-hover>Craft</a><span class="nav__comma">,</span></li>
        <li class="nav__item" style="--i:3"><a href="#about" data-hover>About</a></li>
      </ul>

      <a class="nav__ig" href="https://www.instagram.com/oakly_furnica/" target="_blank" rel="noopener" aria-label="Oakly on Instagram" data-magnetic data-hover>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/>
          <circle cx="12" cy="12" r="4.4"/>
          <circle cx="17.6" cy="6.4" r="1.15" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </nav>

    <!-- Headline block -->
    <div class="headline" data-depth="0.014">
      <h1 class="headline__ghost" aria-label="One Home, One Story">
        <span class="line"><span class="line__inner">One&nbsp;Home<span class="headline__punct">,</span></span></span>
        <span class="line"><span class="line__inner">One&nbsp;Story</span></span>
      </h1>

      <p class="wordmark">
        <span class="wordmark__brand" data-split>oakly</span><sup class="wordmark__reg">®</sup>
        <span class="wordmark__script">Living</span>
      </p>
    </div>

    <!-- Signature block -->
    <div class="signature" data-depth="0.020">
      <span class="signature__script">Oakly</span>
      <span class="signature__rule" aria-hidden="true"></span>
      <p class="signature__name">Oakly Furnica</p>
      <p class="signature__role">Modern Furnica<sup>®</sup> Studio</p>
    </div>

    <!-- Bottom ticker -->
    <div class="ticker">
      <div class="ticker__bar">
        <span class="ticker__label">Next&nbsp;Drop<span class="ticker__caret"></span></span>
        <span class="ticker__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M5 10V7a3 3 0 0 1 3-3h8a3 3 0 0 1 3 3v3a3 3 0 0 1 2 2.83V17a1 1 0 0 1-1 1h-1v2h-2v-2H7v2H5v-2H4a1 1 0 0 1-1-1v-4.17A3 3 0 0 1 5 10Zm2 .17c1.17.41 2 1.52 2 2.83v1h6v-1a3 3 0 0 1 2-2.83V7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v3.17Z"/>
          </svg>
        </span>
        <span class="ticker__event">The&nbsp;Oak&nbsp;Series</span>
        <span class="ticker__date">24.07.</span>
      </div>
      <a class="ticker__cta" href="https://www.instagram.com/oakly_furnica/" target="_blank" rel="noopener" data-magnetic data-hover>
        <span class="ticker__cta-fill" aria-hidden="true"></span>
        <span class="ticker__cta-text">Explore the Drop</span>
      </a>
    </div>

    <!-- Scroll hint -->
    <div class="scrollhint" aria-hidden="true">
      <span class="scrollhint__track"><span class="scrollhint__thumb"></span></span>
      <span class="scrollhint__text">Scroll</span>
    </div>

  </header>

  <script src="script.js"></script>
</body>
</html>
